# OWASP CRS Setup Overrides for NetSapiens
# Source file — used as basis for /etc/modsecurity/crs/crs-setup.conf by nssec waf init
#
# Paranoia level 1 is conservative — increase after tuning false positives.
# See https://coreruleset.org/docs/concepts/paranoia_levels/ for guidance.

# Paranoia level (1 = low FP, less coverage; 4 = max coverage, many FPs)
SecAction \
    "id:900000,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:tx.crs_setup_version=400,\
     setvar:tx.paranoia_level=1,\
     setvar:tx.blocking_paranoia_level=1,\
     setvar:tx.detection_paranoia_level=1"

# Anomaly scoring thresholds
# Inbound 5 = block after a single critical rule match (default)
# Outbound 4 = block on data leakage detection (default)
SecAction \
    "id:900110,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:tx.inbound_anomaly_score_threshold=5,\
     setvar:tx.outbound_anomaly_score_threshold=4"

# Allowed HTTP methods for NetSapiens admin UI and API
SecAction \
    "id:900200,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# Allowed content types
SecAction \
    "id:900220,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |multipart/related| |multipart/mixed| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/cloudevents+json| |application/cloudevents-batch+json|'"
