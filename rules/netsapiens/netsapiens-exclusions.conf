# NetSapiens-specific ModSecurity Exclusions
# Source file — installed to /etc/modsecurity/netsapiens-exclusions.conf by nssec waf init
#
# These rules prevent false positives on the NetSapiens management UI
# and API endpoints while keeping CRS protection active for everything else.
#
# Rule ID range: 1000001–1000999 (reserved for nssec)

# ---- Admin UI form submissions trigger SQL injection false positives ----
# The admin search/filter fields send SQL-like syntax that CRS flags incorrectly.
SecRuleUpdateTargetById 942100 "!REQUEST_COOKIES"
SecRuleUpdateTargetById 942200 "!REQUEST_COOKIES"

# ---- NS API endpoints use base64 in query strings ----
SecRule REQUEST_URI "@beginsWith /ns-api/" \
    "id:1000001,\
     phase:1,\
     pass,\
     nolog,\
     ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:filter"

# ---- Admin UI session handling ----
# Rule 921180 (HTTP Parameter Pollution) false-positives on NS session cookies.
SecRule REQUEST_URI "@beginsWith /SiPbx/" \
    "id:1000002,\
     phase:1,\
     pass,\
     nolog,\
     ctl:ruleRemoveById=921180"

# ---- QoS proxy (NqsProxy) ----
# The QoS proxy sends multipart/mixed which triggers rule 920420
# (content type not allowed by policy). This is normal NS internal traffic.
SecRule REQUEST_URI "@beginsWith /NqsProxy/" \
    "id:1000003,\
     phase:1,\
     pass,\
     nolog,\
     ctl:ruleRemoveById=920420"

# ---- QoS proxy (NqsProxy) ----
# The QoS proxy sends multipart/mixed which triggers rule 920420
# (content type not allowed by policy). This is normal NS internal traffic.
SecRule REQUEST_URI "@beginsWith /NqsProxy/" \
    "id:1000003,\
     phase:1,\
     pass,\
     nolog,\
     ctl:ruleRemoveById=920420"

# ---- iNSight health checks ----
# The iNSight monitoring system polls /cfg/insight_healthcheck.html via AJP proxy.
# Apache denies these with 403 (mod_authz_core), and ModSecurity audit-logs them
# because it captures all 4xx/5xx responses. Bypass CRS for this endpoint.
SecRule REQUEST_URI "@beginsWith /cfg/insight_healthcheck" \
    "id:1000004,\
     phase:1,\
     pass,\
     nolog,\
     ctl:ruleRemoveByTag=OWASP_CRS"

# ---- Localhost internal traffic ----
# NetSapiens services (NmsSBus, ns-api, cfg) communicate over localhost.
# These internal calls trigger false positives:
#   921110 — NmsSBus RegistrarEvents body contains "connect <version>" which
#            matches the HTTP Request Smuggling pattern (connect is a SIP field,
#            not an HTTP CONNECT method)
#   920180 — ns-api internal POSTs lack Content-Length header
#   920350 — internal requests use Host: 127.0.0.1 instead of a hostname
# Bypassing CRS for localhost is safe — if an attacker has local access,
# the WAF is already irrelevant.
SecRule REMOTE_ADDR "@ipMatch 127.0.0.1" \
    "id:1000005,\
     phase:1,\
     pass,\
     nolog,\
     ctl:ruleRemoveByTag=OWASP_CRS"
