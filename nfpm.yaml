name: nssec
arch: amd64
platform: linux
version: ${VERSION}
section: admin
priority: optional
maintainer: Sumner Robinson
description: NetSapiens security platform — audit tools and hardening automation
vendor: ns-security
homepage: https://github.com/jsrobinson3/ns-security
license: Apache-2.0

contents:
  - src: dist/nssec
    dst: /usr/local/bin/nssec
    file_info:
      mode: 0755

  - src: rules/
    dst: /usr/share/nssec/rules/

  - src: insight/
    dst: /usr/share/nssec/insight/

  - src: LICENSE
    dst: /usr/share/doc/nssec/copyright
